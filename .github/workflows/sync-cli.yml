name: Sync from AFAuthHQ/cli

# Triggered by AFAuthHQ/cli on release-tag.
# Payload (client_payload): { tag: string, run_id: string }

on:
  repository_dispatch:
    types: [cli-released]
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions run_id in AFAuthHQ/cli to pull the cobra doc-gen artifact from"
        required: true

