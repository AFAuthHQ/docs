name: Sync from AFAuthHQ/spec

on:
  # Event-driven: triggered by AFAuthHQ/spec via repository_dispatch
  repository_dispatch:
    types: [spec-updated]
  # Reconcile loop — the real convergence guarantee if a dispatch is lost.
  # Frequent is cheap: the sync is a no-op when there's no diff.
  schedule:
    - cron: "17 */4 * * *"
  # Manual override
  workflow_dispatch:

# Serialize: a cron run and a dispatch run must not race on the sync/spec branch.
concurrency:
  group: spec-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Sync spec
        run: npm run sync:spec

      - name: Diff-size sanity check
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- spec/; then
            echo "no-changes=true" >> "$GITHUB_OUTPUT"
            echo "ℹ no spec changes — nothing to do"
            exit 0
          fi
          stats=$(git diff --shortstat -- spec/ || true)
          insertions=$(echo "$stats" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          deletions=$(echo "$stats" | grep -oE '[0-9]+ deletion'  | grep -oE '[0-9]+' || echo 0)
          total=$(( insertions + deletions ))
          echo "insertions=$insertions deletions=$deletions total=$total"
          if [ "$total" -gt 0 ] && [ "$deletions" -gt $(( total / 2 )) ]; then
            echo "::error::Suspicious deletion ratio ($deletions / $total > 50%). Refusing to open auto-merge PR."
            exit 1
          fi
          echo "no-changes=false" >> "$GITHUB_OUTPUT"

      - name: Create PR
        id: cpr
        if: steps.diff.outputs.no-changes != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(sync): spec from AFAuthHQ/spec"
          title: "chore(sync): spec from AFAuthHQ/spec"
          body: |
            Auto-synced from [`AFAuthHQ/spec@main`](https://github.com/AFAuthHQ/spec).

            This PR will auto-merge if all checks pass:
            - Mintlify build
            - Link check
            - Diff-size sanity (already enforced before this PR was opened)

            If any check fails, this PR will stay open with the failing status.
          branch: sync/spec
          delete-branch: true
          labels: "automerge: spec-sync"

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"

      # Make failure visible: a stale-docs symptom otherwise goes unnoticed.
      # Idempotent — one open issue, commented on repeat failures (no spam).
      - name: Surface failure as an issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "sync-broken";
            const { owner, repo } = context.repo;
            const url = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = `Spec → docs sync run failed — \`docs/spec/*.mdx\` may be stale.\n\n${url}`;
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: label, per_page: 1,
            });
            if (open.data.length) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: "Spec → docs sync is failing", body, labels: [label] });
            }
